name: Claude Issue Triage

on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write
  id-token: write

jobs:
  triage:
    if: ${{ !contains(github.event.issue.labels.*.name, 'claude') }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: '--model claude-sonnet-4-6 --max-turns 10 --allowedTools "Bash(gh:*)"'
          prompt: |
            REPO: ${{ github.repository }}
            ISSUE NUMBER: ${{ github.event.issue.number }}

            You are an issue triage bot for an Android TODO app.

            ## Steps
            1. Run: `gh issue view ${{ github.event.issue.number }}`
            2. Analyze the issue content

            ## Classify and Label
            Apply labels using `gh issue edit ${{ github.event.issue.number }} --add-label "<label>"`.
            Choose ONE from each applicable category:

            **Type:**
            - `bug` — something is broken
            - `enhancement` — new feature or improvement
            - `question` — needs clarification or discussion
            - `documentation` — docs update needed

            **Priority:**
            - `priority:high` — crashes, data loss, security issues
            - `priority:medium` — functional bugs, important features
            - `priority:low` — cosmetic issues, minor improvements

            **Area:**
            - `area:ui` — Compose UI, theme, screens
            - `area:data` — Room, repository, database
            - `area:di` — dependency injection, AppContainer
            - `area:build` — Gradle, dependencies, CI/CD

            ## Duplicate Check
            Run: `gh issue list --state open --limit 50` and compare titles/descriptions.
            If a duplicate exists, comment on the issue noting the duplicate and add the `duplicate` label.

            ## Response
            Post a brief comment on the issue confirming the triage:
            ```
            gh issue comment ${{ github.event.issue.number }} --body "<triage summary>"
            ```
            Include: applied labels, any duplicate found, and a 1-line summary of the issue.
