name: Claude Implement Issue

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to implement'
        required: true
        type: number

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  implement:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.label.name == 'auto-implement')
    runs-on: self-hosted
    timeout-minutes: 30
    steps:
      - name: Determine issue number
        id: issue
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "number=${{ inputs.issue_number }}" >> $GITHUB_OUTPUT
          else
            echo "number=${{ github.event.issue.number }}" >> $GITHUB_OUTPUT
          fi

      - name: Fetch issue data
        id: issue_data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_JSON=$(gh issue view ${{ steps.issue.outputs.number }} \
            --repo ${{ github.repository }} \
            --json title,body,number)

          ISSUE_TITLE=$(echo "$ISSUE_JSON" | jq -r '.title')
          ISSUE_BODY=$(echo "$ISSUE_JSON" | jq -r '.body')

          echo "title=$ISSUE_TITLE" >> $GITHUB_OUTPUT

          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "body<<$EOF" >> $GITHUB_OUTPUT
          echo "$ISSUE_BODY" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create feature branch
        run: |
          git checkout -b feat/issue-${{ steps.issue.outputs.number }}

      - name: Implement with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
          ISSUE_TITLE: ${{ steps.issue_data.outputs.title }}
          ISSUE_BODY: ${{ steps.issue_data.outputs.body }}
        run: |
          PROMPT="Implement GitHub issue #${ISSUE_NUMBER}.
          Title: ${ISSUE_TITLE}
          Body: ${ISSUE_BODY}

          1. Read the codebase to understand the architecture (check CLAUDE.md first).
          2. Implement the feature/fix described in the issue.
          3. Follow existing code conventions (Kotlin, Compose, MVVM, manual DI).
          4. Run './gradlew assembleDebug' to verify it compiles.
          5. Run './gradlew testDebugUnitTest' to run tests.
          6. Commit changes with message 'feat: <description> (#${ISSUE_NUMBER})'.
          7. Do NOT push - the workflow will handle that."
          claude -p "$PROMPT" --allowedTools "Bash(git *),Bash(gh *),Bash(./gradlew *),Read,Glob,Grep,Write,Edit"

      - name: Push branch
        run: |
          git push -u origin feat/issue-${{ steps.issue.outputs.number }}

      - name: Create draft PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
          ISSUE_TITLE: ${{ steps.issue_data.outputs.title }}
        run: |
          gh pr create --draft \
            --title "feat: $ISSUE_TITLE" \
            --body "Closes #$ISSUE_NUMBER

          Automated implementation by Claude Code.
          Please review the changes before merging."

      - name: Remove auto-implement label
        if: github.event.label.name == 'auto-implement'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue edit ${{ steps.issue.outputs.number }} \
            --remove-label auto-implement
