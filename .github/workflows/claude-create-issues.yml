name: Claude Create Issues

on:
  workflow_dispatch:
    inputs:
      feature_description:
        description: 'Describe the feature to break into issues'
        required: true
        type: string

permissions:
  contents: read
  issues: write

jobs:
  create-issues:
    runs-on: self-hosted
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--model claude-sonnet-4-6 --max-turns 10"
          direct_prompt: |
            Break down this feature into GitHub issues: ${{ inputs.feature_description }}

            1. Read the codebase to understand the current architecture (check CLAUDE.md first).
            2. Split the feature into 3-6 logical issues.
            3. For each issue, create it with:
               gh issue create --title '<title>' --body '<body>'
            4. Each issue body should include:
               - Description of the task
               - Acceptance criteria (checklist)
               - Files likely to change
               - Suggested approach
            5. Label issues if labels exist (check with gh label list first).
