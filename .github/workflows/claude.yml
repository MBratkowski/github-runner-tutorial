name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request:
    types: [opened, synchronize]
  issues:
    types: [opened, labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  claude:
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'claude')) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          trigger_phrase: "@claude"
          label_trigger: "claude"
          include_fix_links: true
          show_full_output: true
          claude_args: "--model claude-sonnet-4-6 --max-turns 15"
          prompt: |
            You are a senior code reviewer for an Android Todo app (Kotlin, Jetpack Compose, Room, MVVM).
            Read CLAUDE.md for project conventions.

            When reviewing PRs:
            - Focus on bugs, security issues, performance, and code style
            - For small issues: suggest fixes with code, or use "Fix this" links
            - For large issues: create a GitHub issue with `gh issue create` describing the problem, acceptance criteria, and suggested approach
            - Be concise and actionable

            When implementing issues (triggered by 'claude' label):
            - Read the issue description carefully
            - Implement the changes following existing patterns
            - Run `./gradlew assembleDebug` to verify compilation
            - Run `./gradlew testDebugUnitTest` to run tests
            - Commit with descriptive message referencing the issue number
