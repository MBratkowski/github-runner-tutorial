name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request:
    types: [opened, synchronize, reopened]
  issues:
    types: [opened, labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  claude:
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'claude')) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: self-hosted
    timeout-minutes: 30
    steps:
      - name: Override Bun with working baseline build
        run: |
          curl -fsSL https://github.com/oven-sh/bun/releases/download/bun-v1.3.10/bun-darwin-x64-baseline.zip -o /tmp/bun.zip
          unzip -o -q /tmp/bun.zip -d /tmp/bun-override
          mkdir -p "$HOME/.bun/bin"
          cp /tmp/bun-override/bun-darwin-x64-baseline/bun "$HOME/.bun/bin/bun"
          chmod +x "$HOME/.bun/bin/bun"
          rm -rf /tmp/bun.zip /tmp/bun-override

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          path_to_bun_executable: ~/.bun/bin/bun
          claude_args: "--model claude-sonnet-4-6 --max-turns 15 --dangerously-skip-permissions"
          trigger_phrase: "@claude"
          show_full_output: true
          prompt: |
            Review this PR thoroughly. Check for bugs, security issues,
            performance problems, and code style. Post inline review comments
            on specific lines where you find issues. If everything looks good,
            approve the PR with a summary comment.
