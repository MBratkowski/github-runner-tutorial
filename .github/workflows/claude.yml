name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request:
    types: [opened, synchronize, reopened]
  issues:
    types: [opened, labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  claude:
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'claude')) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: self-hosted
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
          fetch-depth: 0

      - name: Setup CI environment
        run: |
          # Install Bun baseline (no AVX required for Intel Mac)
          curl -fsSL https://github.com/oven-sh/bun/releases/download/bun-v1.3.10/bun-darwin-x64-baseline.zip -o /tmp/bun.zip
          unzip -o -q /tmp/bun.zip -d /tmp/bun-override
          mkdir -p /tmp/claude-ci-home/.bun/bin
          cp /tmp/bun-override/bun-darwin-x64-baseline/bun /tmp/claude-ci-home/.bun/bin/bun
          chmod +x /tmp/claude-ci-home/.bun/bin/bun
          rm -rf /tmp/bun.zip /tmp/bun-override

          # Create clean Claude config (no local hooks)
          mkdir -p /tmp/claude-ci-home/.claude
          echo '{}' > /tmp/claude-ci-home/.claude/settings.json

      - uses: anthropics/claude-code-action@v1
        env:
          HOME: /tmp/claude-ci-home
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          path_to_bun_executable: /tmp/claude-ci-home/.bun/bin/bun
          claude_args: "--model claude-sonnet-4-6 --max-turns 15 --dangerously-skip-permissions"
          trigger_phrase: "@claude"
          show_full_output: true
          prompt: |
            Review ONLY the current PR that triggered this workflow.
            Do NOT review or comment on other PRs.
            Use the diff provided in context to review the changes.
            Focus on: bugs, security issues, performance, and code style.
