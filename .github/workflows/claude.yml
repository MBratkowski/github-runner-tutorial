name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request:
    types: [opened, synchronize, reopened]
  issues:
    types: [opened, labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  claude:
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'claude')) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: self-hosted
    timeout-minutes: 30
    steps:
      - name: Install Bun baseline (no AVX required)
        run: |
          curl -fsSL https://github.com/oven-sh/bun/releases/download/bun-v1.3.6/bun-darwin-x64-baseline.zip -o /tmp/bun.zip
          unzip -o -q /tmp/bun.zip -d /tmp/bun-baseline
          chmod +x /tmp/bun-baseline/bun-darwin-x64-baseline/bun
          rm /tmp/bun.zip

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          path_to_bun_executable: /tmp/bun-baseline/bun-darwin-x64-baseline/bun
          claude_args: "--model claude-sonnet-4-6 --max-turns 15"
