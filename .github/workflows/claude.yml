name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request:
    types: [opened, synchronize]
  issues:
    types: [opened, labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  claude:
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'claude')) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          trigger_phrase: "@claude"
          label_trigger: "claude"
          include_fix_links: true
          show_full_output: true
          claude_args: "--model claude-sonnet-4-6 --max-turns 15"
          prompt: |
            You are reviewing PR #${{ github.event.pull_request.number || github.event.issue.number }} in ${{ github.repository }}.
            Event: ${{ github.event_name }} (${{ github.event.action }})

            IMPORTANT: You MUST take action. Do NOT just say you're ready.

            If this is a pull_request event:
            1. Run: gh pr diff ${{ github.event.pull_request.number || github.event.issue.number }}
            2. Review the diff for bugs, security issues, performance problems, and style
            3. Read CLAUDE.md for project conventions
            4. Post your review with: gh pr review ${{ github.event.pull_request.number || github.event.issue.number }} --comment --body "<your review>"
            5. Be concise and reference specific files/lines

            If this is an issue event with 'claude' label:
            1. Run: gh issue view ${{ github.event.issue.number }}
            2. Implement the requested changes
            3. Run ./gradlew assembleDebug && ./gradlew testDebugUnitTest
            4. Commit and push

            If this is a comment with @claude:
            1. Read the comment and respond to the request
