name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request:
    types: [opened, synchronize]
  issues:
    types: [opened, labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          mode: review
          review_comment_prefix: "**Claude Review:**"
          claude_args: "--model claude-sonnet-4-6"
          prompt: |
            You are a senior code reviewer for an Android Todo app (Kotlin, Jetpack Compose, Room, MVVM).
            Read CLAUDE.md for project conventions.
            Focus on bugs, security issues, performance, and code style.
            Be concise and actionable.

  agent:
    if: |
      (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'claude')) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          trigger_phrase: "@claude"
          label_trigger: "claude"
          include_fix_links: true
          claude_args: "--model claude-sonnet-4-6 --max-turns 15"
          prompt: |
            You are a senior developer for an Android Todo app (Kotlin, Jetpack Compose, Room, MVVM).
            Read CLAUDE.md for project conventions.

            When fixing code or implementing features:
            - Follow existing patterns in the codebase
            - Run `./gradlew assembleDebug` to verify compilation
            - Run `./gradlew testDebugUnitTest` to run tests
            - Commit with descriptive message referencing the issue number
