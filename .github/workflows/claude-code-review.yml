name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: self-hosted
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Get PR info
        id: pr
        run: |
          echo "number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          echo "base=${{ github.event.pull_request.base.ref }}" >> $GITHUB_OUTPUT

      - name: Review PR (read-only)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          BASE_BRANCH: ${{ steps.pr.outputs.base }}
        run: |
          PROMPT="You are reviewing PR #${PR_NUMBER}.
          1. Run 'git diff origin/${BASE_BRANCH}...HEAD' to see all changes.
          2. Review the code for bugs, security issues, performance problems, and style.
          3. Post your review as a PR comment using: gh pr comment ${PR_NUMBER} --body '<your review>'
          4. Be constructive and specific. If the code looks good, say so.
          5. Format the review in markdown with sections for each file changed."
          claude -p "$PROMPT" --allowedTools "Bash(git diff:*),Bash(git log:*),Bash(gh *),Read,Glob,Grep"

      - name: Auto-fix minor issues
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          BASE_BRANCH: ${{ steps.pr.outputs.base }}
        run: |
          PROMPT="You are auto-fixing minor issues in PR #${PR_NUMBER}.
          1. Run 'git diff origin/${BASE_BRANCH}...HEAD' to see all changes.
          2. Fix ONLY: formatting issues, typos in comments/strings, missing newlines at EOF, trailing whitespace.
          3. Do NOT change logic, rename variables, or refactor code.
          4. If you made changes, commit with message 'fix: auto-fix minor formatting issues' and push.
          5. If no fixes needed, do nothing."
          claude -p "$PROMPT" --allowedTools "Bash(git *),Read,Glob,Grep,Write,Edit"
