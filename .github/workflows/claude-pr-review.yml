name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

permissions:
  contents: read
  pull-requests: write
  id-token: write

concurrency:
  group: claude-pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          include_fix_links: true
          claude_args: '--model claude-sonnet-4-6 --max-turns 25 --allowedTools "Bash(gh:*)"'
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are an expert Android/Kotlin code reviewer. Review this PR thoroughly.

            ## Steps
            1. Run: `gh pr diff ${{ github.event.pull_request.number }}`
            2. Read `CLAUDE.md` for project conventions and review guidelines
            3. Analyze the diff for issues

            ## Review Focus (Android-specific)
            - Coroutine usage: proper scope (viewModelScope), structured concurrency, suspend functions
            - Compose recomposition: stable parameters, proper use of remember/derivedStateOf, state hoisting
            - Room database: Flow for reactive queries, proper @Transaction usage, migration strategy
            - Memory leaks: context references, coroutine scope lifecycle, callback cleanup
            - Null safety and error handling
            - General: bugs, security issues, performance, code style

            ## Severity Ratings
            Use these severity levels for each finding:
            - **CRITICAL** — bugs, crashes, security vulnerabilities, data loss risks
            - **WARNING** — performance issues, potential memory leaks, incorrect patterns
            - **SUGGESTION** — better approaches, cleaner patterns, maintainability improvements
            - **NITPICK** — style, naming, minor formatting

            ## Output Format — Inline Comments
            Post a SINGLE GitHub review with all findings as inline comments on specific lines.

            ### How to determine line numbers
            1. Run `gh pr diff ${{ github.event.pull_request.number }}`
            2. Look at `@@` hunk headers: `@@ -10,6 +12,8 @@` — the `+12` means new file line 12
            3. Count lines with `+` or ` ` prefix from hunk start to find each line number
            4. Read the changed files to verify exact line numbers

            ### Posting the review
            1. Use the Write tool to create `/tmp/review.json`
            2. Run: `gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews --method POST --input /tmp/review.json`

            The JSON MUST follow this exact structure:
            ```json
            {
              "event": "COMMENT",
              "body": "## PR Review Summary\n\n<1-line assessment>",
              "comments": [
                {
                  "path": "app/src/.../File.kt",
                  "line": 59,
                  "side": "RIGHT",
                  "body": "**[CRITICAL]** Description."
                }
              ]
            }
            ```

            CRITICAL: Each comment MUST have `"line"` (integer = line in the new file) and `"side": "RIGHT"`.
            Do NOT use `"position"`. Only comment on lines that appear in the diff.
            Put ALL findings in one review. Use severity: **[CRITICAL]**, **[WARNING]**, **[SUGGESTION]**, **[NITPICK]**.
            Only flag real issues. Be concise.
