name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

permissions:
  contents: read
  pull-requests: write
  id-token: write

concurrency:
  group: claude-pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          include_fix_links: true
          claude_args: '--model claude-sonnet-4-6 --max-turns 15 --allowedTools "Bash(gh:*)"'
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are an expert Android/Kotlin code reviewer. Review this PR thoroughly.

            ## Steps
            1. Run: `gh pr diff ${{ github.event.pull_request.number }}`
            2. Read `CLAUDE.md` for project conventions and review guidelines
            3. Analyze the diff for issues

            ## Review Focus (Android-specific)
            - Coroutine usage: proper scope (viewModelScope), structured concurrency, suspend functions
            - Compose recomposition: stable parameters, proper use of remember/derivedStateOf, state hoisting
            - Room database: Flow for reactive queries, proper @Transaction usage, migration strategy
            - Memory leaks: context references, coroutine scope lifecycle, callback cleanup
            - Null safety and error handling
            - General: bugs, security issues, performance, code style

            ## Severity Ratings
            Use these severity levels for each finding:
            - **CRITICAL** — bugs, crashes, security vulnerabilities, data loss risks
            - **WARNING** — performance issues, potential memory leaks, incorrect patterns
            - **SUGGESTION** — better approaches, cleaner patterns, maintainability improvements
            - **NITPICK** — style, naming, minor formatting

            ## Output Format
            Post your review using the GitHub API with INLINE comments on specific lines.
            Use `gh pr diff ${{ github.event.pull_request.number }}` to identify the exact changed line numbers in the diff.

            IMPORTANT: You MUST use the `line` parameter (not `position`) — this is the line number in the file, not the diff hunk position.
            Only comment on lines that are part of the PR diff (added or modified lines on the RIGHT side of the diff).

            Build a JSON file `/tmp/review.json` with this structure:
            ```json
            {
              "event": "COMMENT",
              "body": "## PR Review Summary\n\n<1-line overall assessment>",
              "comments": [
                {
                  "path": "relative/path/to/file.kt",
                  "line": <line_number_in_file>,
                  "side": "RIGHT",
                  "body": "**[SEVERITY]** Description of the issue.\n\nSuggested fix: ..."
                }
              ]
            }
            ```

            Then post it with:
            ```bash
            gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews \
              --method POST \
              --input /tmp/review.json
            ```

            Rules:
            - Each finding = one inline comment on the exact line
            - Use severity prefix: **[CRITICAL]**, **[WARNING]**, **[SUGGESTION]**, **[NITPICK]**
            - The `body` field in the top-level review is a short summary
            - Only flag real issues, not stylistic preferences unless they violate CLAUDE.md conventions
            - Be concise in each comment
