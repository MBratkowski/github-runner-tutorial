name: Claude Comment Handler

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  handle-comment:
    if: >
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '@claude')
    runs-on: self-hosted
    timeout-minutes: 30
    steps:
      - name: Get PR branch
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_DATA=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.issue.number }})
          echo "branch=$(echo $PR_DATA | jq -r '.head.ref')" >> $GITHUB_OUTPUT
          echo "number=${{ github.event.issue.number }}" >> $GITHUB_OUTPUT

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.branch }}
          fetch-depth: 0

      - name: Add reaction
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -X POST -f content='+1'

      - name: Run Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          PROMPT="A user commented on PR #${PR_NUMBER} with: ${COMMENT_BODY}
          1. Understand what they're asking for.
          2. Read the relevant files and implement the requested changes.
          3. Commit your changes with a descriptive message and push.
          4. Reply to the PR with a comment summarizing what you did:
             gh pr comment ${PR_NUMBER} --body '<summary of changes>'"
          claude -p "$PROMPT" \
            --allowedTools "Bash(git *),Bash(gh *),Read,Glob,Grep,Write,Edit" \
            --dangerously-skip-permissions
