name: Claude Data Layer Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    paths:
      - 'app/src/main/java/**/data/**'
      - 'app/src/main/java/**/di/**'

permissions:
  contents: read
  pull-requests: write
  id-token: write

concurrency:
  group: claude-data-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  data-review:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: '--model claude-sonnet-4-6 --max-turns 10 --allowedTools "Bash(gh:*)"'
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are a specialized Android data layer reviewer. Focus ONLY on data and DI concerns.

            ## Steps
            1. Run: `gh pr diff ${{ github.event.pull_request.number }}`
            2. Read relevant data layer files for full context
            3. Post a focused review

            ## Review Focus
            - **Room Safety:** SQL injection risks in @Query, raw queries without parameterized args
            - **Transactions:** Missing @Transaction on multi-table operations, read-modify-write without transaction
            - **Migration Strategy:** Schema changes without migration, destructive migration usage
            - **Reactive Patterns:** Flow vs suspend — queries that should be reactive using suspend instead
            - **Repository Pattern:** Business logic leaking into DAO, repository bypassed by direct DAO access
            - **DI Scoping:** Singleton vs scoped instances, context leaks in DI container, lazy initialization issues

            ## Output Format
            Post your review using the GitHub API with INLINE comments on specific lines.
            Use `gh pr diff ${{ github.event.pull_request.number }}` to identify the exact changed line numbers in the diff.

            IMPORTANT: You MUST use the `line` parameter (not `position`) — this is the line number in the file, not the diff hunk position.
            Only comment on lines that are part of the PR diff (added or modified lines on the RIGHT side of the diff).

            Build a JSON file `/tmp/review.json` with this structure:
            ```json
            {
              "event": "COMMENT",
              "body": "## [Data Layer Review]\n\n<1-line summary of data layer findings>",
              "comments": [
                {
                  "path": "relative/path/to/file.kt",
                  "line": <line_number_in_file>,
                  "side": "RIGHT",
                  "body": "**[SEVERITY]** Description of the issue.\n\nSuggested fix: ..."
                }
              ]
            }
            ```

            Then post it with:
            ```bash
            gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews \
              --method POST \
              --input /tmp/review.json
            ```

            Rules:
            - Each finding = one inline comment on the exact line
            - Use severity prefix: **[CRITICAL]**, **[WARNING]**, **[SUGGESTION]**, **[NITPICK]**
            - Only report findings relevant to data/DI layer. Skip general code style issues.
            - Be concise in each comment
