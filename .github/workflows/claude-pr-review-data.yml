name: Claude Data Layer Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    paths:
      - 'app/src/main/java/**/data/**'
      - 'app/src/main/java/**/di/**'

permissions:
  contents: read
  pull-requests: write
  id-token: write

concurrency:
  group: claude-data-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  data-review:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: '--model claude-sonnet-4-6 --max-turns 25 --allowedTools "Bash(gh:*)"'
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are a specialized Android data layer reviewer. Focus ONLY on data and DI concerns.

            ## Steps
            1. Run: `gh pr diff ${{ github.event.pull_request.number }}`
            2. Read relevant data layer files for full context
            3. Post a focused review

            ## Review Focus
            - **Room Safety:** SQL injection risks in @Query, raw queries without parameterized args
            - **Transactions:** Missing @Transaction on multi-table operations, read-modify-write without transaction
            - **Migration Strategy:** Schema changes without migration, destructive migration usage
            - **Reactive Patterns:** Flow vs suspend — queries that should be reactive using suspend instead
            - **Repository Pattern:** Business logic leaking into DAO, repository bypassed by direct DAO access
            - **DI Scoping:** Singleton vs scoped instances, context leaks in DI container, lazy initialization issues

            ## Output Format — Inline Comments
            Post a SINGLE GitHub review with all findings as inline comments on specific lines.

            ### How to determine line numbers
            1. Run `gh pr diff ${{ github.event.pull_request.number }}`
            2. Look at `@@` hunk headers: `@@ -10,6 +12,8 @@` — the `+12` means new file line 12
            3. Count lines with `+` or ` ` prefix from hunk start to find each line number
            4. Read the changed files to verify exact line numbers

            ### Posting the review
            1. Use the Write tool to create `/tmp/review.json`
            2. Run: `gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews --method POST --input /tmp/review.json`

            The JSON MUST follow this exact structure:
            ```json
            {
              "event": "COMMENT",
              "body": "## [Data Layer Review]\n\n<1-line summary>",
              "comments": [
                {
                  "path": "app/src/.../File.kt",
                  "line": 27,
                  "side": "RIGHT",
                  "body": "**[CRITICAL]** Description."
                }
              ]
            }
            ```

            CRITICAL: Each comment MUST have `"line"` (integer = line in the new file) and `"side": "RIGHT"`.
            Do NOT use `"position"`. Only comment on lines that appear in the diff.
            Put ALL findings in one review. Use severity: **[CRITICAL]**, **[WARNING]**, **[SUGGESTION]**, **[NITPICK]**.
            Only flag data/DI issues. Be concise.
