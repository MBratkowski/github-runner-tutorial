name: Claude Data Layer Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    paths:
      - 'app/src/main/java/**/data/**'
      - 'app/src/main/java/**/di/**'

permissions:
  contents: read
  pull-requests: write
  id-token: write

concurrency:
  group: claude-data-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  data-review:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: '--model claude-sonnet-4-6 --max-turns 15 --allowedTools "Bash(gh:*)"'
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are a specialized Android data layer reviewer. Focus ONLY on data and DI concerns.

            ## Steps
            1. Run: `gh pr diff ${{ github.event.pull_request.number }}`
            2. Read relevant data layer files for full context
            3. Post a focused review

            ## Review Focus
            - **Room Safety:** SQL injection risks in @Query, raw queries without parameterized args
            - **Transactions:** Missing @Transaction on multi-table operations, read-modify-write without transaction
            - **Migration Strategy:** Schema changes without migration, destructive migration usage
            - **Reactive Patterns:** Flow vs suspend — queries that should be reactive using suspend instead
            - **Repository Pattern:** Business logic leaking into DAO, repository bypassed by direct DAO access
            - **DI Scoping:** Singleton vs scoped instances, context leaks in DI container, lazy initialization issues

            ## Output Format — Inline Comments
            Post your review using the GitHub API with inline comments pinned to specific lines.

            ### How to determine line numbers
            1. Run `gh pr diff ${{ github.event.pull_request.number }}`
            2. In the diff output, look at the `@@` hunk headers, e.g. `@@ -10,6 +12,8 @@`
               - The `+12,8` means new file starts at line 12 for 8 lines
            3. Count lines with `+` prefix (added) or ` ` prefix (context) from the hunk start
            4. The `line` value in your JSON must be the LINE NUMBER IN THE NEW VERSION OF THE FILE
            5. You can also read the full file to verify line numbers

            ### CRITICAL RULES for the JSON
            - Use `"line"` (integer) — the line number in the file, NOT the diff position
            - Use `"side": "RIGHT"` — always comment on the new version
            - Do NOT include a `"position"` field — it will override `line` and break placement
            - Only comment on lines that appear in the diff (added or modified lines)

            ### Build and post the review
            Create `/tmp/review.json`:
            ```json
            {
              "event": "COMMENT",
              "body": "## [Data Layer Review]\n\n<1-line summary>",
              "comments": [
                {
                  "path": "app/src/main/java/com/example/todoapp/data/repository/TodoRepository.kt",
                  "line": 27,
                  "side": "RIGHT",
                  "body": "**[CRITICAL]** Missing `@Transaction` — data loss risk."
                }
              ]
            }
            ```

            Post with:
            ```bash
            gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews \
              --method POST \
              --input /tmp/review.json
            ```

            Rules:
            - Each finding = one inline comment on the exact line
            - Use severity prefix: **[CRITICAL]**, **[WARNING]**, **[SUGGESTION]**, **[NITPICK]**
            - Only report findings relevant to data/DI layer. Skip general code style issues.
            - Be concise in each comment
